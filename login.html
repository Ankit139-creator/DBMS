<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Canteen Review System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">🍽️ Canteen<span>Review</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>🔐 Login</h2>
            <p class="subtitle">Welcome back, student!</p>

            <form method="POST" action="api/login.php" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>

            <p class="switch-link">Don't have an account? <a href="register.html">Register here</a></p>

            <hr style="margin: 20px 0; border: 1px solid #eee;">
            <p class="switch-link"><a href="api/admin.php">🛡️ Admin Login</a></p>
        </div>
    </div>
</body>

</html>
